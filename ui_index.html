<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Society Maintenance Management - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">
    
    <div id="loginModal" class="modal active">
        <form class="modal-content" id="loginForm">
            <span class="close" onclick="closeModal()">&times;</span>
            
            <div class="imgcontainer">
                <img src="logo.jpg" alt="Society Logo" class="avatar">
                <h1>Society Maintenance Management</h1>
            </div>
            
            <div class="container">
                <label for="role"><b>Login as:</b></label>
                <select id="role" name="role">
                    <option value="admin">Admin</option>
                    <option value="resident">Resident</option>
                    <option value="staff">Staff</option>
                </select>
                
                <label for="uname"><b>Username / Flat No.</b></label>
                <input type="text" id="uname" placeholder="Enter username or flat number" required>
                
                <label for="psw"><b>Password</b></label>
                <div class="eye">
                    <input type="password" id="psw" placeholder="Enter Password" required>
                    <span class="eye-icon" id="eyeIcon">👁️</span>
                </div>
                
                <div id="errorMsg" class="error" style="display:none;">Invalid credentials!</div>
                <div id="successMsg" class="success" style="display:none;">Login successful!</div>
                
                <button type="submit">Login</button>
            </div>
        </form>
    </div>

    <script>
        // Password toggle - FIXED
        document.addEventListener('DOMContentLoaded', function() {
            const eyeIcon = document.getElementById('eyeIcon');
            const passwordField = document.getElementById('psw');
            
            eyeIcon.addEventListener('click', function() {
                if (passwordField.type === 'password') {
                    passwordField.type = 'text';
                    eyeIcon.textContent = '🙈';
                } else {
                    passwordField.type = 'password';
                    eyeIcon.textContent = '👁️';
                }
            });
        });

        // Login form handling - FIXED
        document.addEventListener('DOMContentLoaded', function() {
            const loginForm = document.getElementById('loginForm');
            
            loginForm.addEventListener('submit', function(event) {
                event.preventDefault();
                
                const uname = document.getElementById('uname').value.toLowerCase().trim();
                const psw = document.getElementById('psw').value;
                const role = document.getElementById('role').value;
                
                // FIXED Demo credentials matching
                const credentials = {
                    'admin': 'admin',
                    '123': 'resident',
                    'staff': 'staff'
                };
                
                if (credentials[uname] && credentials[uname] === psw) {
                    // Success - Store user info and redirect
                    localStorage.setItem('loggedInUser', uname.charAt(0).toUpperCase() + uname.slice(1));
                    localStorage.setItem('userRole', role);
                    document.getElementById('successMsg').style.display = 'block';
                    document.getElementById('errorMsg').style.display = 'none';
                    
                    setTimeout(() => {
                        window.location.href = 'maintenance.html';
                    }, 1000);
                } else {
                    // Error message
                    document.getElementById('errorMsg').style.display = 'block';
                    document.getElementById('successMsg').style.display = 'none';
                    setTimeout(() => {
                        document.getElementById('errorMsg').style.display = 'none';
                    }, 3000);
                }
            });
        });

        function closeModal() {
            document.getElementById('loginModal').classList.remove('active');
        }
    </script>
</body>
</html>
